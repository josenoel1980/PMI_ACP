<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMI-ACP® Ultimate Study Guide 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0a1628;
  --navy2: #0d1f3c;
  --blue: #1a56db;
  --blue2: #2563eb;
  --accent: #00c9a7;
  --accent2: #06d6a0;
  --gold: #f59e0b;
  --red: #ef4444;
  --purple: #8b5cf6;
  --sidebar-w: 290px;
  --bg: #f0f4ff;
  --surface: #ffffff;
  --text: #0f172a;
  --text2: #475569;
  --border: #e2e8f0;
  --highlight: #fff3cd;
  --code-bg: #1e293b;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(10,22,40,0.10);
  --shadow2: 0 2px 8px rgba(10,22,40,0.07);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Sora', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  font-size: 15px;
}

/* ── LAYOUT ────────────────────────────────────────────── */
#app { display: flex; min-height: 100vh; }

/* ── SIDEBAR ───────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--navy);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  transition: width 0.3s ease, min-width 0.3s ease;
  z-index: 100;
}
#sidebar.collapsed { width: 56px; min-width: 56px; }
#sidebar.collapsed .sidebar-label,
#sidebar.collapsed .section-items,
#sidebar.collapsed #search-box,
#sidebar.collapsed .sidebar-logo-text { display: none; }
#sidebar.collapsed .section-header { justify-content: center; padding: 10px 0; }
#sidebar.collapsed .section-icon { margin: 0; }

.sidebar-top {
  padding: 20px 16px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.sidebar-badge {
  background: linear-gradient(135deg, var(--accent), var(--blue));
  color: white;
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 13px;
  padding: 5px 10px;
  border-radius: 6px;
  white-space: nowrap;
}
.sidebar-logo-text {
  color: rgba(255,255,255,0.55);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* Search */
.search-wrap {
  position: relative;
}
#search-box {
  width: 100%;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 8px 12px 8px 34px;
  color: white;
  font-size: 13px;
  font-family: 'Sora', sans-serif;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
#search-box::placeholder { color: rgba(255,255,255,0.35); }
#search-box:focus {
  border-color: var(--accent);
  background: rgba(255,255,255,0.10);
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  pointer-events: none;
}
#search-results-count {
  font-size: 10px;
  color: var(--accent);
  margin-top: 5px;
  padding-left: 2px;
  min-height: 14px;
}

/* Nav */
#sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 20px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
#sidebar-nav::-webkit-scrollbar { width: 4px; }
#sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

.nav-section { margin-bottom: 2px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 9px 16px;
  cursor: pointer;
  color: rgba(255,255,255,0.8);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
  transition: background 0.15s, color 0.15s;
  user-select: none;
  border-left: 3px solid transparent;
}
.section-header:hover { background: rgba(255,255,255,0.06); color: white; }
.section-header.active { background: rgba(0,201,167,0.12); color: var(--accent); border-left-color: var(--accent); }
.section-icon {
  width: 22px;
  height: 22px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  flex-shrink: 0;
}
.section-label { flex: 1; }
.chevron {
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  transition: transform 0.2s;
}
.section-header.open .chevron { transform: rotate(90deg); }

.section-items {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
}
.section-items.open { max-height: 1000px; }
.nav-item {
  display: block;
  padding: 6px 16px 6px 47px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: color 0.15s, background 0.15s;
  text-decoration: none;
  border-left: 3px solid transparent;
  margin-left: 0;
}
.nav-item:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.04); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,201,167,0.07); }

/* Toggle btn */
#toggle-sidebar {
  position: fixed;
  left: calc(var(--sidebar-w) - 14px);
  top: 22px;
  width: 28px;
  height: 28px;
  background: var(--navy2);
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 200;
  color: rgba(255,255,255,0.6);
  font-size: 11px;
  transition: left 0.3s ease, background 0.2s;
}
#toggle-sidebar:hover { background: var(--navy); color: white; }
body.sidebar-collapsed #toggle-sidebar { left: 42px; }

/* ── MAIN ──────────────────────────────────────────────── */
#main {
  flex: 1;
  overflow-y: auto;
  min-width: 0;
}

/* Top bar */
#topbar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 14px 40px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow2);
}
.topbar-title {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
  flex: 1;
}
.topbar-badge {
  background: linear-gradient(135deg, var(--accent), var(--blue2));
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 0.04em;
}
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text2);
}
.progress-bar-outer {
  width: 120px;
  height: 4px;
  background: var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.progress-bar-inner {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--blue2));
  border-radius: 4px;
  transition: width 0.4s ease;
  width: 0%;
}

/* Content area */
#content {
  padding: 40px 48px 80px;
  max-width: 960px;
}

/* Search highlight */
.search-highlight {
  background: #fef08a;
  border-radius: 3px;
  padding: 0 2px;
}

/* ── CONTENT STYLES ────────────────────────────────────── */
.page-section { display: none; }
.page-section.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-hero {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 60%, #0f2f5a 100%);
  border-radius: 16px;
  padding: 36px 40px;
  margin-bottom: 36px;
  position: relative;
  overflow: hidden;
}
.section-hero::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, rgba(0,201,167,0.15) 0%, transparent 70%);
}
.hero-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 8px;
}
.hero-title {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 700;
  color: white;
  line-height: 1.2;
  margin-bottom: 12px;
}
.hero-subtitle {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  max-width: 600px;
  line-height: 1.6;
}
.hero-stats {
  display: flex;
  gap: 24px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.hero-stat {
  text-align: center;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  padding: 12px 20px;
  min-width: 90px;
}
.hero-stat-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
  display: block;
}
.hero-stat-label {
  font-size: 10px;
  color: rgba(255,255,255,0.45);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 2px;
}

h2.content-h2 {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--navy);
  margin: 36px 0 14px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
h2.content-h2::before {
  content: '';
  width: 4px;
  height: 22px;
  background: linear-gradient(to bottom, var(--accent), var(--blue2));
  border-radius: 2px;
  flex-shrink: 0;
}
h3.content-h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--blue2);
  margin: 24px 0 10px;
}
h4.content-h4 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin: 18px 0 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text2);
}

p.content-p {
  color: var(--text2);
  margin-bottom: 14px;
  font-size: 14.5px;
  line-height: 1.8;
}

/* Callout boxes */
.callout {
  border-radius: 10px;
  padding: 18px 22px;
  margin: 18px 0;
  border-left: 4px solid;
}
.callout-blue { background: #eff6ff; border-color: var(--blue2); }
.callout-green { background: #f0fdf4; border-color: #16a34a; }
.callout-amber { background: #fffbeb; border-color: var(--gold); }
.callout-red { background: #fef2f2; border-color: var(--red); }
.callout-purple { background: #faf5ff; border-color: var(--purple); }
.callout-navy { background: #f0f4ff; border-color: var(--navy); }
.callout-title {
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 10px;
  letter-spacing: 0.02em;
}
.callout-blue .callout-title { color: var(--blue2); }
.callout-green .callout-title { color: #16a34a; }
.callout-amber .callout-title { color: #92400e; }
.callout-red .callout-title { color: var(--red); }
.callout-purple .callout-title { color: var(--purple); }
.callout-navy .callout-title { color: var(--navy); }
.callout ul { padding-left: 18px; }
.callout li { font-size: 13.5px; color: var(--text); margin-bottom: 5px; line-height: 1.6; }

/* Tables */
.content-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 13.5px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow2);
}
.content-table th {
  background: var(--navy);
  color: white;
  padding: 11px 14px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.content-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
  line-height: 1.6;
}
.content-table tr:last-child td { border-bottom: none; }
.content-table tr:nth-child(even) td { background: #f8faff; }
.content-table tr:hover td { background: #f0f4ff; }
td strong { color: var(--navy); font-weight: 600; }

/* Value cards */
.value-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 18px 0;
}
.value-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}
.value-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(to bottom, var(--accent), var(--blue2));
}
.value-card-over {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.value-card-left {
  font-size: 14px;
  font-weight: 700;
  color: var(--navy);
  margin-bottom: 4px;
}
.value-card-right {
  font-size: 12.5px;
  color: var(--text2);
}

/* Principles list */
.principle-item {
  display: flex;
  gap: 14px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 13px 16px;
  margin-bottom: 8px;
  transition: box-shadow 0.15s;
}
.principle-item:hover { box-shadow: var(--shadow2); }
.principle-num {
  width: 26px;
  height: 26px;
  background: linear-gradient(135deg, var(--accent), var(--blue2));
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}
.principle-text { font-size: 13.5px; color: var(--text); line-height: 1.6; }
.principle-note { font-size: 12px; color: var(--accent); font-weight: 600; margin-top: 3px; }

/* Q&A blocks */
.qa-block {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 16px;
  overflow: hidden;
  box-shadow: var(--shadow2);
}
.qa-question {
  padding: 14px 18px;
  font-size: 14px;
  font-weight: 600;
  color: var(--navy);
  cursor: pointer;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  background: white;
  transition: background 0.15s;
  border-bottom: 1px solid transparent;
}
.qa-question:hover { background: #f8faff; }
.qa-question.open { background: #f0f4ff; border-bottom-color: var(--border); }
.qa-qnum {
  width: 28px;
  height: 28px;
  background: var(--navy);
  color: white;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  font-family: 'JetBrains Mono', monospace;
}
.qa-qtxt { flex: 1; line-height: 1.55; }
.qa-toggle { color: var(--text2); font-size: 12px; flex-shrink: 0; margin-top: 3px; transition: transform 0.2s; }
.qa-question.open .qa-toggle { transform: rotate(180deg); }
.qa-body { display: none; padding: 16px 18px; }
.qa-body.open { display: block; animation: fadeIn 0.2s ease; }
.qa-options { list-style: none; margin-bottom: 14px; }
.qa-option {
  padding: 9px 13px;
  border-radius: 7px;
  margin-bottom: 6px;
  font-size: 13.5px;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: background 0.15s, border-color 0.15s;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.qa-option:hover { background: #f8faff; border-color: var(--blue2); }
.qa-option.correct { background: #f0fdf4; border-color: #16a34a; }
.qa-option.incorrect { background: #fef2f2; border-color: var(--red); }
.qa-option-letter {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--text2);
}
.qa-option.correct .qa-option-letter { background: #16a34a; color: white; }
.qa-option.incorrect .qa-option-letter { background: var(--red); color: white; }
.qa-answer {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 8px;
  padding: 13px 16px;
  font-size: 13.5px;
  color: #14532d;
  margin-top: 6px;
}
.qa-answer strong { color: #16a34a; }

/* Domain cards */
.domain-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 18px 0;
}
.domain-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.domain-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.domain-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 4px;
}
.domain-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--navy);
  margin-bottom: 6px;
}
.domain-desc { font-size: 12.5px; color: var(--text2); line-height: 1.55; }
.domain-bar {
  height: 4px;
  border-radius: 4px;
  margin-top: 12px;
  background: var(--border);
  overflow: hidden;
}
.domain-bar-fill { height: 100%; border-radius: 4px; }

/* Tuckman stages */
.tuckman-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin: 18px 0;
}
.tuckman-card {
  border-radius: 10px;
  padding: 16px 12px;
  text-align: center;
}
.tuckman-stage {
  font-weight: 800;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.tuckman-desc { font-size: 11.5px; line-height: 1.5; margin-bottom: 8px; }
.tuckman-leader { font-size: 11px; font-weight: 600; font-style: italic; }

/* Framework cards */
.framework-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 14px;
  margin: 18px 0;
}
.framework-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  transition: box-shadow 0.15s;
}
.framework-card:hover { box-shadow: var(--shadow); }
.fw-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  margin-bottom: 10px;
}
.fw-name { font-weight: 700; font-size: 14px; color: var(--navy); margin-bottom: 4px; }
.fw-tagline { font-size: 11.5px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
.fw-desc { font-size: 12px; color: var(--text2); line-height: 1.55; }

/* Formula cards */
.formula-card {
  background: var(--code-bg);
  border-radius: 10px;
  padding: 18px 22px;
  margin: 12px 0;
  border-left: 3px solid var(--accent);
}
.formula-name { color: var(--accent); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.formula-expr {
  font-family: 'JetBrains Mono', monospace;
  color: #e2e8f0;
  font-size: 15px;
  margin-bottom: 6px;
}
.formula-note { color: #94a3b8; font-size: 12.5px; line-height: 1.6; }

/* Tips list */
.tip-list { list-style: none; margin: 12px 0; }
.tip-item {
  display: flex;
  gap: 12px;
  padding: 9px 14px;
  border-radius: 7px;
  margin-bottom: 6px;
  font-size: 13.5px;
  align-items: flex-start;
}
.tip-item:nth-child(odd) { background: white; border: 1px solid var(--border); }
.tip-item:nth-child(even) { background: #f8faff; border: 1px solid #e8eeff; }
.tip-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.tip-text { color: var(--text); line-height: 1.6; }

/* Metric cards grid */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 18px 0;
}
.metric-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.metric-name { font-size: 12px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
.metric-formula {
  font-family: 'JetBrains Mono', monospace;

.search-result-title { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 3px; }
.search-result-preview { font-size: 12.5px; color: var(--text2); line-height: 1.5; }

.no-results { text-align: center; padding: 40px; color: var(--text2); font-size: 14px; }

/* Cheat sheet compact */
.cheatsheet-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin: 14px 0;
}
.cs-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.cs-card-head {
  background: var(--navy);
  color: white;
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.cs-card-body { padding: 12px 14px; }
.cs-item {
  display: flex;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 12.5px;
  align-items: baseline;
}
.cs-item:last-child { border-bottom: none; }
.cs-key { font-weight: 700; color: var(--navy); min-width: 80px; flex-shrink: 0; }
.cs-val { color: var(--text2); line-height: 1.5; }

/* Acronym table search */

  width: 100%;
  padding: 10px 14px;

function callout(type, title, items) {
  return `<div class="callout callout-${type}">
    <div class="callout-title">${title}</div>
    <ul>${items.map(i => `<li>${i}</li>`).join('')}</ul>
  </div>`;
}

function table(headers, rows) {
  return `<table class="content-table">
    <thead><tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(row => `<tr>${row.map(c => `<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>
  </table>`;
}

function qaBlock(num, question, options, answer, explanation) {
  const letters = ['A','B','C','D'];
  return `<div class="qa-block" data-qa="${num}">
    <div class="qa-question" onclick="toggleQA(${num})">
      <div class="qa-qnum">Q${num}</div>
      <div class="qa-qtxt">${question}</div>
      <div class="qa-toggle">▼</div>
    </div>
    <div class="qa-body" id="qa-body-${num}">
      <ul class="qa-options">
        ${options.map((opt, i) => `<li class="qa-option" onclick="selectOpt(this,${num},'${letters[i]}','${answer}')" data-letter="${letters[i]}">
          <span class="qa-option-letter">${letters[i]}</span>
          <span>${opt}</span>
        </li>`).join('')}
      </ul>
      <div class="qa-answer" id="qa-ans-${num}" style="display:none">
        <strong>✔ Answer: ${answer}</strong> — ${explanation}
      </div>
    </div>
  </div>`;
}

function renderFormulas() {
  return `
  <div class="section-hero">
    <div class="hero-eyebrow">Section 7</div>
    <div class="hero-title">Key Formulas & Calculations</div>
    <div class="hero-subtitle">While PMI-ACP is primarily scenario-based, you may encounter calculation questions — especially EVM, PERT, and velocity forecasting.</div>
  </div>

  <h2 class="content-h2" id="velocity-formulas">Velocity & Forecasting</h2>
  <div class="formula-card">
    <div class="formula-name">Average Velocity</div>
    <div class="formula-expr">Average Velocity = Σ(story points per sprint) ÷ Number of sprints</div>
    <div class="formula-note">Use last 3–5 sprints. Example: (38+42+36+44) ÷ 4 = 40 pts/sprint</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">Sprints to Complete</div>
    <div class="formula-expr">Sprints needed = Remaining story points ÷ Average velocity</div>
    <div class="formula-note">Example: 200 pts ÷ 40 pts/sprint = 5 sprints remaining. Always round UP.</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">Team Capacity</div>
    <div class="formula-expr">Capacity = Team members × Sprint days × Hours/day × Focus factor</div>
    <div class="formula-note">Focus factor = 70–80% (accounts for meetings, interruptions). Example: 6 × 10 × 8 × 0.75 = 360 hours</div>
  </div>

  <h2 class="content-h2" id="evm">Earned Value Management (EVM)</h2>
  ${table(['Metric', 'Formula', 'Good', 'Bad'], [
    ['<strong>EV</strong> (Earned Value)', '% complete × BAC', '> PV', '< PV'],
    ['<strong>PV</strong> (Planned Value)', 'Planned % × BAC', '—', '—'],
    ['<strong>CV</strong> (Cost Variance)', 'EV − AC', 'Positive', 'Negative = over budget'],
    ['<strong>SV</strong> (Schedule Variance)', 'EV − PV', 'Positive', 'Negative = behind schedule'],
    ['<strong>CPI</strong>', 'EV ÷ AC', '> 1.0', '< 1.0 = over budget'],
    ['<strong>SPI</strong>', 'EV ÷ PV', '> 1.0', '< 1.0 = behind schedule'],
    ['<strong>EAC</strong>', 'BAC ÷ CPI', 'Lower than BAC', 'Higher than BAC'],
    ['<strong>ETC</strong>', 'EAC − AC', '—', '—'],
    ['<strong>VAC</strong>', 'BAC − EAC', 'Positive = under budget', 'Negative = over budget'],
  ])}

  ${callout('navy', '📊 EVM Worked Example', [
    'Project BAC = $200,000. Planned to be 50% done. Actually 40% done. Spent $110,000.',
    'PV = 50% × $200,000 = $100,000',
    'EV = 40% × $200,000 = $80,000',
    'AC = $110,000',
    'CV = $80K − $110K = −$30,000 (OVER BUDGET)',
    'SV = $80K − $100K = −$20,000 (BEHIND SCHEDULE)',
    'CPI = $80K ÷ $110K = 0.73 (spending $1.37 per $1 of value)',
    'EAC = $200K ÷ 0.73 = $273,973 (total forecast cost at this efficiency)'
  ])}

  <h2 class="content-h2" id="pert">PERT — Three-Point Estimation</h2>
  <div class="formula-card">
    <div class="formula-name">Expected Duration (te)</div>
    <div class="formula-expr">te = (Optimistic + 4 × Most Likely + Pessimistic) ÷ 6</div>
    <div class="formula-note">Most Likely counts 4× because it's the most likely outcome. Example: (2 + 4×5 + 14) ÷ 6 = 36 ÷ 6 = 6 days</div>
  </div>
  <div class="formula-card">
    <div class="formula-name">Standard Deviation (σ)</div>
    <div class="formula-expr">σ = (Pessimistic − Optimistic) ÷ 6</div>
    <div class="formula-note">Example: (14 − 2) ÷ 6 = 2 days. Higher σ = more uncertainty in the estimate.</div>
  </div>

  <h2 class="content-h2" id="kanban-formulas">Kanban & Little's Law</h2>
  <div class="formula-card">
    <div class="formula-name">Little's Law</div>
    <div class="formula-expr">Cycle Time = WIP ÷ Throughput</div>
    <div class="formula-note">If 10 items in progress and team completes 2/day → Cycle time = 10 ÷ 2 = 5 days. REDUCE WIP → REDUCE CYCLE TIME.</div>
  </div>
  `;
}

function renderQuestions() {

      [3, "Midway through a sprint, a competitor releases a product making 3 planned features obsolete. What should the Scrum Master do?", ["A. Allow immediate replacement since agile welcomes change","B. Refuse any changes — the sprint backlog is locked","C. Discuss with PO and team: if sprint goal is obsolete the sprint can be cancelled; otherwise reprioritize next sprint","D. Escalate to the project sponsor"], "C", "Agile welcomes change (Principle 2). A sprint can be cancelled ONLY by the PO when the sprint goal is no longer valid. Otherwise complete the sprint and reprioritize in the next one."],

      [8, "An organization needs extensive compliance documentation before any code is written. What is the best agile approach?", ["A. Refuse to use agile — it's incompatible with compliance","B. Apply agile delivery practices while creating required compliance documentation in parallel — tailor the approach","C. Eliminate all documentation requirements","D. Use waterfall for documentation and agile only for coding"], "B", "Agile can be tailored to regulated environments. Many healthcare IT and financial services teams use agile successfully with compliance documentation as part of the Definition of Done."],

      [60, "A Product Owner must choose between: Feature A ($5K cost, $20K/month delay cost) vs Feature B ($15K cost, $15K/month delay cost). Using WSJF, which wins?", ["A. Feature A — WSJF score is higher","B. Feature B — WSJF score is higher","C. Feature A — it costs less","D. Feature B — it has higher value"], "A", "WSJF = Cost of Delay ÷ Job Size. Feature A: 20÷5=4.0. Feature B: 15÷15=1.0. Feature A prioritized. WSJF favors small, high-value items."],

    { id: 'q-delivery', section: 'Domain 4: Delivery Questions (Q76–Q100)', qs: [
      [76, "A burndown chart shows a flat line for 3 consecutive days mid-sprint. What does this indicate?", ["A. Team is on track — flat lines are normal","B. The team is blocked or carrying undetected impediments — investigate immediately","C. Burndown chart needs recalibrating","D. Add more stories to maintain momentum"], "B", "Flat burndown = no work moving to done. Signals blockers, unclear acceptance criteria, or rework. This is exactly what the daily standup should surface."],
      [77, "Team completes 38, 34, 42, 40, 36 story points in 5 sprints. Remaining backlog = 180 pts. How many sprints needed?", ["A. Velocity=36, Sprints=5","B. Velocity=38, Sprints≈5 (4.73 rounds up)","C. Velocity=40, Sprints=4.5","D. Velocity=38, Sprints=4"], "B", "Average velocity = (38+34+42+40+36)÷5 = 190÷5 = 38. Sprints = 180÷38 = 4.73 → rounds UP to 5. Always round up for sprint counts."],
      [78, "When would you use a burnup chart over a burndown chart?", ["A. Burndown is always more accurate","B. Use burnup when scope changes are frequent — it shows completed work against total scope, making scope additions visibly clear","C. Burnup for sprints; burndown for releases","D. They show the same information"], "B", "Burnup has two lines — completed work and total scope. Scope additions visibly move the scope line up. Burndown cannot show scope changes clearly."],

      [81, "Which of the following BEST describes a 'spike' in agile?", ["A. Sprint focused entirely on technical debt","B. Time-boxed research to answer a specific question and reduce uncertainty — knowledge, not software, is the output","C. Emergency sprint to fix critical bugs","D. Planning session for a new feature"], "B", "A spike is time-boxed (1-4 days), answers a specific question, and produces knowledge as output. The knowledge enables proper estimation of the related story."],

const searchIndex = [];
function buildSearchIndex() {
  SECTIONS.forEach(sec => {
    const content = renderSection(sec.id);
    const div = document.createElement('div');
    div.innerHTML = content;
    // Index subsections
    sec.subsections.forEach(sub => {
      const el = div.querySelector(`#${sub.id}`);
      if (el) {
        let text = '';
        let node = el.nextElementSibling;
        while (node && !['H2'].includes(node.tagName)) {
          text += ' ' + (node.textContent || '');
          node = node.nextElementSibling;
        }
        searchIndex.push({ sectionId: sec.id, sectionTitle: sec.title, subId: sub.id, title: sub.title, text: text.trim().slice(0, 500) });
      }
    });
    // Also index the whole section
    searchIndex.push({ sectionId: sec.id, sectionTitle: sec.title, subId: null, title: sec.title, text: div.textContent.slice(0, 1000) });
  });
}

// ══════════════════════════════════════════════════════
//  UI LOGIC
// ══════════════════════════════════════════════════════
let currentSection = 'overview';
let visitedSections = new Set();
const contentCache = {};

function navigateTo(sectionId, subId) {
  // Update current section
  currentSection = sectionId;
  visitedSections.add(sectionId);

  // Render content (cached)
  if (!contentCache[sectionId]) {
    contentCache[sectionId] = renderSection(sectionId);
  }

  // Show content
  const content = document.getElementById('content');
  content.innerHTML = contentCache[sectionId];

  // Make QA interactive
  initQA();

  // Scroll to sub-section if specified
  if (subId) {
    setTimeout(() => {
      const el = document.getElementById(subId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  } else {
    content.closest('#main').scrollTo({ top: 0, behavior: 'smooth' });
  }

  // Update sidebar active states
  document.querySelectorAll('.section-header').forEach(h => h.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const activeHeader = document.querySelector(`.section-header[data-sec="${sectionId}"]`);
  if (activeHeader) activeHeader.classList.add('active');
  if (subId) {
    const activeItem = document.querySelector(`.nav-item[data-sub="${subId}"]`);
    if (activeItem) activeItem.classList.add('active');
  }

  // Update progress
  updateProgress();

  // Update URL hash silently
  history.replaceState(null, '', `#${sectionId}${subId ? '-'+subId : ''}`);
}

function updateProgress() {
  const total = SECTIONS.length;
  const pct = Math.round((visitedSections.size / total) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = pct + '%';
}

// Build sidebar
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = SECTIONS.map(sec => `
    <div class="nav-section">
      <div class="section-header" data-sec="${sec.id}" onclick="toggleSection('${sec.id}', this)">
        <div class="section-icon" style="background:${sec.color}22;color:${sec.color}">${sec.icon}</div>
        <span class="section-label sidebar-label">${sec.title}</span>
        <span class="chevron sidebar-label">▶</span>
      </div>
      <div class="section-items" id="items-${sec.id}">
        ${sec.subsections.map(sub => `
          <a class="nav-item sidebar-label" data-sub="${sub.id}" onclick="navigateTo('${sec.id}','${sub.id}')">${sub.title}</a>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleSection(secId, header) {
  const items = document.getElementById(`items-${secId}`);
  const isOpen = items.classList.contains('open');

  // Close all
  document.querySelectorAll('.section-items').forEach(i => i.classList.remove('open'));
  document.querySelectorAll('.section-header').forEach(h => h.classList.remove('open'));

  if (!isOpen) {
    items.classList.add('open');
    header.classList.add('open');
    navigateTo(secId, null);
  } else {
    navigateTo(secId, null);
  }
}

// Sidebar toggle
document.getElementById('toggle-sidebar').addEventListener('click', () => {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('toggle-sidebar');
  sidebar.classList.toggle('collapsed');
  document.body.classList.toggle('sidebar-collapsed');
  btn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
});

// ── Q&A INTERACTIONS ────────────────────────────────────
function initQA() {
  // already handled via onclick in HTML
}
function toggleQA(num) {
  const body = document.getElementById(`qa-body-${num}`);
  const question = body.previousElementSibling;
  body.classList.toggle('open');
  question.classList.toggle('open');
}
function selectOpt(el, num, letter, answer) {
  const block = el.closest('.qa-block');
  block.querySelectorAll('.qa-option').forEach(o => {
    o.classList.remove('correct', 'incorrect');
    if (o.dataset.letter === answer) o.classList.add('correct');
    else if (o.dataset.letter === letter) o.classList.add('incorrect');
  });
  document.getElementById(`qa-ans-${num}`).style.display = 'block';
}

// ── SEARCH ──────────────────────────────────────────────
function highlightText(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

let searchTimeout;
document.getElementById('search-box').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (!q) { document.getElementById('search-results-count').textContent = ''; return; }
  searchTimeout = setTimeout(() => {
    const results = searchIndex.filter(item =>
      item.title.toLowerCase().includes(q.toLowerCase()) ||
      item.text.toLowerCase().includes(q.toLowerCase())
    ).slice(0, 5);
    document.getElementById('search-results-count').textContent =
      results.length ? `${results.length} result${results.length > 1 ? 's' : ''} found` : 'No results';
    if (results.length === 1) navigateTo(results[0].sectionId, results[0].subId);
  }, 300);
});

document.getElementById('search-box').addEventListener('keydown', e => {
  if (e.key === 'Enter') openSearchOverlay(e.target.value);
  if (e.key === 'Escape') e.target.blur();
});

function openSearchOverlay(initialQuery = '') {
  const overlay = document.getElementById('search-overlay');
  overlay.classList.add('active');
  const input = document.getElementById('search-modal-input');
  input.value = initialQuery;
  input.focus();
  if (initialQuery) performModalSearch(initialQuery);
}

document.getElementById('search-modal-input').addEventListener('input', e => {
  performModalSearch(e.target.value);
});
document.getElementById('search-modal-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSearchOverlay();
});
document.getElementById('search-close-btn').addEventListener('click', closeSearchOverlay);
document.getElementById('search-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('search-overlay')) closeSearchOverlay();
});

function closeSearchOverlay() {
  document.getElementById('search-overlay').classList.remove('active');
}

function performModalSearch(query) {
  const resultsDiv = document.getElementById('search-modal-results');
  if (!query.trim()) { resultsDiv.innerHTML = '<div class="no-results">Type to search...</div>'; return; }

  const results = searchIndex.filter(item =>
    item.title.toLowerCase().includes(query.toLowerCase()) ||
    item.text.toLowerCase().includes(query.toLowerCase())
  ).slice(0, 12);

  if (!results.length) {
    resultsDiv.innerHTML = '<div class="no-results">No results found. Try different keywords.</div>';
    return;
  }

  resultsDiv.innerHTML = results.map((r, i) => {
    const preview = r.text.slice(0, 160);
    return `<div class="search-result-item" onclick="selectSearchResult('${r.sectionId}','${r.subId || ''}')">
      <div class="search-result-section">${r.sectionTitle}</div>
      <div class="search-result-title">${highlightText(r.title, query)}</div>
      <div class="search-result-preview">${highlightText(preview, query)}...</div>
    </div>`;
  }).join('');
}

function selectSearchResult(sectionId, subId) {
  closeSearchOverlay();
  navigateTo(sectionId, subId || null);
  document.getElementById('search-box').value = '';
}

// Keyboard shortcut: Ctrl+K or Cmd+K to open search
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    openSearchOverlay();
  }
});

// Acronym filter
function filterAcronyms(query) {
  const rows = document.querySelectorAll('#acronym-table tbody tr');
  rows.forEach(row => {
    const text = row.textContent.toLowerCase();
    row.style.display = text.includes(query.toLowerCase()) ? '' : 'none';
  });
}

// ── INIT ────────────────────────────────────────────────
buildSidebar();
buildSearchIndex();
navigateTo('overview', null);
// Open first section
const firstItems = document.getElementById('items-overview');
if (firstItems) firstItems.classList.add('open');
const firstHeader = document.querySelector('.section-header[data-sec="overview"]');
if (firstHeader) firstHeader.classList.add('open');
</script>
</body>
